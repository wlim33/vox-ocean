cascade_count = 3
max_in_flight_frames = 3

[wave]
wind_speed_mps = 12.0
wind_dir_rad   = 0.5
choppiness     = 0.8
swell          = 0.3
amplitude      = 4000.0
# Diorama high-pass: waves longer than this are suppressed (0 = open ocean).
max_wavelength_m = 20.0

[sky]
cubemap_resolution = 128
sun_elevation_rad  = 0.7
sun_azimuth_rad    = 1.1
turbidity          = 3.0

[shading]
foam_threshold     = 0.15
foam_strength      = 1.0
depth_fog_density  = 0.05

[bench]
bench_mode      = false
warmup_frames   = 60
measure_frames  = 600
camera_path     = "orbit"
output_path     = "bench-{timestamp}.csv"

[voxel]
grid_extent   = 192
voxel_size_m  = 0.5
height_step_m = 0.25
base_depth_m  = 10.0
height_cells  = 64
floor_seed    = 7

[march]
max_steps    = 512
render_scale = 1.0
